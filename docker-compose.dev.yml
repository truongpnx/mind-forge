services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    # use port fowarding to access the app from the host machine instead of inside the container
    # ports:
    #   - "8080:8080"
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - go-pkg:/go/pkg/mod
    environment:
      - GOPATH=/go
    restart: unless-stopped

volumes:
  go-cache:
  go-pkg:
