services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    # use port fowarding to access the app from the host machine instead of inside the container
    ports:
      - "8080:8080"
    command: ["tail", "-f", "/dev/null"]
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - go-pkg:/go/pkg/mod
    env_file:
      - .env
    environment:
      - GOPATH=/go
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
    networks:
      - mind-forge-net
    restart: unless-stopped

volumes:
  go-cache:
  go-pkg:

networks:
  mind-forge-net:
    external: true
    name: mind-forge-net
